idea:
  title: An LLM That's Careful With Its Words
  domain: nlp
  hypothesis: 'Requiring a large language model (LLM) to use chain-of-thought reasoning
    and insert explicit "thinking tokens" between every sentence will cause the model
    to consider each sentence more carefully before generating it, resulting in qualitatively
    different text compared to standard LLM outputs.

    '
  background:
    description: 'Can we use chain-of-thought to make an LLM that considers every
      sentence carefully before stating it? For instance, simply require some thinking
      tokens between every sentence. How would text from such a model be qualitatively
      different?

      '
  metadata:
